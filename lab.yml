  hosts: lab
  become: true
  gather_facts: true
  roles:
    - role: system-setup
      tags: system-setup
    - role: user-setup
      tags: user-setup
    - role: bridge-networking
      tags: bridge-networking
    - role: podman
      tags: podman
    - role: podman-macvlan
      tags: podman-macvlan
    - role: pihole
      tags: pihole
    - role: nfs-media
      tags: nfs-media
    - role: va-api
      tags: va-api
