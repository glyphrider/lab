set -g pane-border-status top

unbind C-b
set -g prefix C-space
bind -n C-space send-prefix

# Windows and panes start at 1
set -g base-index 1
setw -g pane-base-index 1

# Status bar
set -g status-position bottom
set -g status-style bg=colour235,fg=white
set -g status-left "[#S] "
set -g status-left-length 30
set -g status-right "#(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/.*/ [&]/') %H:%M %d-%b"
set -g status-right-length 60
set -g window-status-current-style bg=blue,fg=white,bold
