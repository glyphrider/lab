---
- name: Ensure NFS client packages are installed
  ansible.builtin.dnf:
    name:
      - nfs-utils
    state: present

- name: Create NFS mount point directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
  loop: "{{ nfs_mounts }}"

- name: Mount NFS shares
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: nfs
    opts: soft,noatime
    state: mounted
  loop: "{{ nfs_mounts }}"
