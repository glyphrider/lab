---
nm_dir: /etc/NetworkManager/system-connections

mgmt_bridge:  management0
mgmt_ip:      192.168.1.3
mgmt_prefix:  24
mgmt_gw:      192.168.1.1
mgmt_dns:     192.168.1.1

vlan_id:    2
vlan_iface: vlan2

marisol_bridge: marisol0
marisol_ip:     10.47.2.3
marisol_prefix: 24
marisol_dns:    10.47.2.1

iot_vlan_id:    3
iot_vlan_iface: vlan3

iot_bridge: iot0
iot_ip:     10.47.3.3
iot_prefix: 24
iot_dns:    10.47.3.1

# Fixed UUIDs so NM treats these files as the same connection across re-runs.
uuid_mgmt0:    "11111111-1111-4111-a111-111111111111"
uuid_port:     "22222222-2222-4222-a222-222222222222"
uuid_vlan2:    "33333333-3333-4333-a333-333333333333"
uuid_marisol0: "44444444-4444-4444-a444-444444444444"
uuid_vlan3:    "55555555-5555-4555-a555-555555555555"
uuid_iot0:     "66666666-6666-4666-a666-666666666666"
