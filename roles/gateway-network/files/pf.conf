vlan1 = "aggr0"
vlan2 = "vlan2"
vlan3 = "vlan3"
vlan4 = "vlan4"

table <martians> { 0.0.0.0/8 10.0.0.0/8 127.0.0.0/8 169.254.0.0/16 \
                   172.16.0.0/12 192.0.0.0/24 192.0.2.0/24 224.0.0.0/3 \
                   192.168.0.0/16 198.18.0.0/15 198.51.100.0/24 \
                   203.0.113.0/24 }

set block-policy drop
set loginterface egress
set skip on lo0

match in all scrub (no-df random-id max-mss 1460)
match out on egress inet from !(egress:network) to any nat-to (egress:0)

antispoof quick for { egress $vlan1 $vlan2 $vlan3 $vlan4 }
block in quick on egress from <martians> to any
block return out quick on egress from any to <martians>
block all

pass out quick inet
pass in on { $vlan1 $vlan2 $vlan3 $vlan4 } inet from any

block in on $vlan1 from $vlan1:network to { $vlan2:network $vlan3:network $vlan4:network }
block in on $vlan2 from $vlan2:network to { $vlan1:network $vlan3:network $vlan4:network }
block in on $vlan3 from $vlan3:network to { $vlan1:network $vlan2:network $vlan4:network }
block in on $vlan4 from $vlan4:network to { $vlan1:network $vlan2:network $vlan3:network }
