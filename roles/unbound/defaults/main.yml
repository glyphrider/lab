---
unbound_root_hints_url:  https://www.internic.net/domain/named.root
unbound_root_hints_path: /var/unbound/db/root.hints

unbound_interfaces:
  - 127.0.0.1
  - 192.168.1.1
  - 10.47.2.1
  - 10.47.3.1
  - 10.47.4.1

# unbound_local_zone, unbound_access_control, and unbound_views are defined
# in group_vars/all/vars.yml so the unbound-container role can share them.
