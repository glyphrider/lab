---
- name: Create terraform directory
  ansible.builtin.file:
    path: "{{ rhel_terraform_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Read lab server public key
  ansible.builtin.slurp:
    src: "/home/{{ ansible_user }}/.ssh/id_ed25519.pub"
  register: _lab_pubkey

- name: Read authorized_keys for ansible_user
  ansible.builtin.slurp:
    src: "/home/{{ ansible_user }}/.ssh/authorized_keys"
  register: _authorized_keys

- name: Set SSH keys fact
  ansible.builtin.set_fact:
    _vm_ssh_keys: >-
      {{ (_authorized_keys.content | b64decode).splitlines()
         | reject('match', '^\\s*#')
         | reject('equalto', '')
         + [_lab_pubkey.content | b64decode | trim]
         | list }}

- name: Download VM base images
  ansible.builtin.get_url:
    url:  "{{ item.image_url }}"
    dest: "{{ rhel_image_dir }}/{{ item.image }}"
    mode: '0644'
  loop: "{{ rhel_vms }}"
  when: item.image_url is defined

- name: Template main.tf
  ansible.builtin.template:
    src: main.tf.j2
    dest: "{{ rhel_terraform_dir }}/main.tf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Template per-VM user-data
  ansible.builtin.template:
    src: user-data.yml.j2
    dest: "{{ rhel_terraform_dir }}/{{ item.name }}-user-data.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  loop: "{{ rhel_vms }}"

- name: Template per-VM network-config
  ansible.builtin.template:
    src: network-config.yml.j2
    dest: "{{ rhel_terraform_dir }}/{{ item.name }}-network-config.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  loop: "{{ rhel_vms }}"

- name: Terraform init
  ansible.builtin.command:
    cmd: terraform init -upgrade
    chdir: "{{ rhel_terraform_dir }}"
  become_user: "{{ ansible_user }}"
  changed_when: false

- name: Terraform apply
  ansible.builtin.command:
    cmd: terraform apply -auto-approve
    chdir: "{{ rhel_terraform_dir }}"
  become_user: "{{ ansible_user }}"
  register: _tf_apply
  changed_when: "'No changes.' not in _tf_apply.stdout"

- name: Wait for SSH on each VM
  ansible.builtin.wait_for:
    host: "{{ item.ip }}"
    port: 22
    delay: 15
    timeout: 300
  loop: "{{ rhel_vms }}"
  when: _tf_apply.changed

- name: Wait for cloud-init to complete on each VM
  ansible.builtin.command: >
    ssh -o StrictHostKeyChecking=accept-new
        -o UserKnownHostsFile=/dev/null
        -i /home/{{ ansible_user }}/.ssh/id_ed25519
        {{ ansible_user }}@{{ item.ip }}
        sudo cloud-init status --wait
  become: false
  changed_when: false
  failed_when: _cloud_init.rc not in [0, 2]
  register: _cloud_init
  loop: "{{ rhel_vms }}"
  when: _tf_apply.changed
