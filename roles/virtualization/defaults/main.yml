---
virtualization_packages:
  - libvirt
  - qemu-kvm
  - genisoimage

vm_ubuntu_image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
vm_terraform_dir:    /var/lab/terraform/unifi
vm_name:             unifi
vm_memory:           4096
vm_vcpu:             2
vm_disk_size:        34359738368  # 32 GiB
vm_ip:               192.168.1.2
vm_gateway:          192.168.1.1
vm_dns:              192.168.1.5
vm_network_bridge:   management0
vm_network_interface: enp0s3
