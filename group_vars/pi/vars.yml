---
pihole_network_type: bridge
pihole_tls_enabled:  false
pihole_compose_bin:  /usr/bin/podman-compose

pihole_instances:
  - name:     pihole-management
    ip:       192.168.1.251
    upstream: 192.168.1.1
    hostname: pihole2.marisol.home
    domain:   pihole2.marisol.home

  - name:     pihole-marisol
    ip:       10.47.2.251
    upstream: 10.47.2.1
    hostname: pihole2-marisol.marisol.home
    domain:   pihole2.marisol.home

  - name:     pihole-iot
    ip:       10.47.3.251
    upstream: 10.47.3.1
    hostname: pihole2-iot.marisol.home
    domain:   pihole2.marisol.home
