---
ansible_user: brian
ansible_become_method: sudo

unbound_local_zone: marisol.home

unbound_access_control:
  - { subnet: 127.0.0.0/8,    action: allow }
  - { subnet: 192.168.1.0/24, action: allow }
  - { subnet: 10.47.2.0/24,   action: allow }
  - { subnet: 10.47.3.0/24,   action: allow }
  - { subnet: 10.47.4.0/24,   action: allow }
  - { subnet: 0.0.0.0/0,      action: refuse }

unbound_views:
  - name: management
    clients:
      - 127.0.0.0/8
      - 192.168.1.0/24
    records:
      - { name: gateway,    ip: 192.168.1.1   }
      - { name: unifi,      ip: 192.168.1.2   }
      - { name: lab,        ip: 192.168.1.3   }
      - { name: nas,        ip: 192.168.1.4   }
      - { name: pihole,     ip: 192.168.1.5   }
      - { name: office,     ip: 192.168.1.14  }
      - { name: sunroom,    ip: 192.168.1.16  }
      - { name: library,    ip: 192.168.1.18  }
      - { name: cottingly,  ip: 192.168.1.20  }
      - { name: rhel8,      ip: 192.168.1.35  }
      - { name: rhel9,      ip: 192.168.1.36  }
      - { name: ol9,        ip: 192.168.1.39  }
      - { name: pihole2,    ip: 192.168.1.251 }
      - { name: jellyfin,   ip: 10.47.2.6     }
      - { name: grafana,    ip: 192.168.1.7   }
      - { name: prometheus, ip: 192.168.1.8   }

  - name: marisol
    clients:
      - 10.47.2.0/24
    records:
      - { name: gateway,  ip: 10.47.2.1   }
      - { name: pihole,   ip: 10.47.2.5   }
      - { name: jellyfin, ip: 10.47.2.6   }
      - { name: pihole2,  ip: 10.47.2.251 }

  - name: iot
    clients:
      - 10.47.3.0/24
    records:
      - { name: gateway, ip: 10.47.3.1   }
      - { name: pihole,  ip: 10.47.3.5   }
      - { name: pihole2, ip: 10.47.3.251 }

  - name: work
    clients:
      - 10.47.4.0/24
    records:
      - { name: gateway, ip: 10.47.4.1 }
